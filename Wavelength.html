<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wavelength & Frequency: Visible Light</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05050a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to canvas if needed */
        }
        .hud-element {
            pointer-events: auto;
            backdrop-filter: blur(10px);
            background: rgba(10, 10, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Frequency Pulse Overlay */
        #pulse-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 50%, rgba(173, 255, 47, 0.05) 100%);
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        
        .rhythmic-pulse {
            animation: pulse-rapid 0.1s infinite alternate;
        }
        
        @keyframes pulse-rapid {
            from { opacity: 0.1; transform: scale(1); }
            to { opacity: 0.4; transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <!-- Canvas for rendering the wave animation -->
    <canvas id="waveCanvas"></canvas>
    
    <!-- Visual frequency pulsing overlay -->
    <div id="pulse-overlay"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="flex flex-col justify-between p-8">
        <header class="max-w-2xl">
            <h1 class="text-4xl font-bold tracking-tight text-white/90 drop-shadow-md">
                Wavelength & Frequency
            </h1>
            <p class="text-lg text-white/60 mt-2 font-light tracking-wide">
                Visualizing the physical length and rapid cycle of a greenish-yellow photon.
            </p>
        </header>

        <div class="flex justify-between items-end">
            <div id="data-readout" class="hud-element p-6 rounded-2xl opacity-0 transition-opacity duration-1000 transform translate-y-4">
                <div class="text-sm uppercase tracking-widest text-white/50 mb-1">Measured Wavelength</div>
                <div class="text-5xl font-bold text-[#adff2f] drop-shadow-[0_0_15px_rgba(173,255,47,0.5)]">
                    550 <span class="text-2xl text-white/70">nm</span>
                </div>
                
                <div id="freq-readout" class="mt-4 pt-4 border-t border-white/10 opacity-0 transition-opacity duration-700">
                    <div class="text-sm uppercase tracking-widest text-white/50 mb-1">Frequency (Cycles/Second)</div>
                    <div class="text-3xl font-mono text-white animate-pulse">
                        ~545 <span class="text-xl text-white/70">THz</span>
                    </div>
                    <div class="text-xs text-white/40 mt-1 font-mono">545,000,000,000,000 Hz</div>
                </div>
            </div>

            <button id="restartBtn" class="hud-element px-6 py-3 rounded-full text-white/80 hover:text-white hover:bg-white/10 transition-all active:scale-95 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Restart Animation
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('pulse-overlay');
        const readout = document.getElementById('data-readout');
        const freqReadout = document.getElementById('freq-readout');
        const restartBtn = document.getElementById('restartBtn');

        let width, height, centerY;
        let animationFrameId;
        let startTime = 0;
        
        // Easing function
        const easeInOutQuad = t => t < .5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
        const easeOutQuint = t => 1 - Math.pow(1 - t, 5);

        // Core animation variables
        let params = {
            phase: 0,
            wavelength: 60,
            amplitude: 40,
            speed: 0.15, // Phase shift per frame
            r: 255, g: 255, b: 255,
            glow: 15,
            lineWidth: 3,
            measureAlpha: 0,
            pulseIntensity: 0
        };

        // Resize handler
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // High frequency background layer
        function drawHighFrequencyBackground(intensity, timeElapsed) {
            if (intensity <= 0) return;
            ctx.save();
            ctx.beginPath();
            ctx.strokeStyle = `rgba(173, 255, 47, ${intensity * 0.1})`;
            ctx.lineWidth = 1;
            
            // Draw many rapid chaotic waves
            const hfWavelength = 10;
            const hfAmplitude = height * 0.4 * intensity;
            const fastPhase = timeElapsed * 0.05;
            
            for (let x = 0; x < width; x += 2) {
                let y = centerY + Math.sin(x / hfWavelength - fastPhase) * hfAmplitude 
                              * Math.sin(x * 0.01 + fastPhase * 0.2); // modulate amplitude
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.restore();
        }

        // Draw the main wave
        function drawWave() {
            ctx.save();
            ctx.beginPath();
            
            // Define glow and color
            ctx.strokeStyle = `rgb(${params.r}, ${params.g}, ${params.b})`;
            ctx.lineWidth = params.lineWidth;
            ctx.shadowBlur = params.glow;
            ctx.shadowColor = `rgb(${params.r}, ${params.g}, ${params.b})`;
            
            // To make it look intensely bright, we draw it lighter
            ctx.globalCompositeOperation = 'screen';

            for (let x = 0; x <= width; x += 2) {
                // We use sine function to create the wave. 
                // Negative amplitude makes peaks go up (standard visual)
                let y = centerY - params.amplitude * Math.sin((x / params.wavelength) * Math.PI * 2 - params.phase);
                
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();
            
            // Draw a brighter core to the wave when glowing hard
            if (params.glow > 20) {
                ctx.beginPath();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = params.lineWidth * 0.4;
                ctx.shadowBlur = 0;
                for (let x = 0; x <= width; x += 4) {
                    let y = centerY - params.amplitude * Math.sin((x / params.wavelength) * Math.PI * 2 - params.phase);
                    if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            
            ctx.restore();
        }

        // Draw the measurement bracket between two peaks
        function drawMeasurement() {
            if (params.measureAlpha <= 0) return;
            
            ctx.save();
            ctx.globalAlpha = params.measureAlpha;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.lineWidth = 2;
            
            // Find two peaks. Peak occurs when Math.sin(...) = 1
            // (x / wl) * 2PI - phase = PI/2 + 2*PI*n
            // x = wl * ( (PI/2 + phase)/(2PI) + n )
            
            // We want peaks near the center of the screen
            let centerN = Math.floor( (width/2) / params.wavelength - (Math.PI/2 + params.phase)/(2*Math.PI) );
            
            let peak1X = params.wavelength * ( (Math.PI/2 + params.phase)/(2*Math.PI) + centerN );
            let peak2X = params.wavelength * ( (Math.PI/2 + params.phase)/(2*Math.PI) + centerN + 1 );
            
            let peakY = centerY - params.amplitude; // Top of the wave
            let lineY = peakY - 60; // Bracket height
            
            // Draw vertical drop lines
            ctx.beginPath();
            ctx.setLineDash([5, 5]);
            ctx.moveTo(peak1X, peakY - 10);
            ctx.lineTo(peak1X, lineY - 20);
            ctx.moveTo(peak2X, peakY - 10);
            ctx.lineTo(peak2X, lineY - 20);
            ctx.stroke();
            
            // Draw horizontal bracket
            ctx.beginPath();
            ctx.setLineDash([]);
            ctx.moveTo(peak1X, lineY);
            ctx.lineTo(peak2X, lineY);
            ctx.stroke();
            
            // Draw arrows
            ctx.beginPath();
            ctx.moveTo(peak1X + 10, lineY - 5);
            ctx.lineTo(peak1X, lineY);
            ctx.lineTo(peak1X + 10, lineY + 5);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(peak2X - 10, lineY - 5);
            ctx.lineTo(peak2X, lineY);
            ctx.lineTo(peak2X - 10, lineY + 5);
            ctx.stroke();
            
            // Draw Text
            ctx.font = "bold 24px 'Segoe UI', sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "bottom";
            ctx.fillText("550 nm", (peak1X + peak2X) / 2, lineY - 15);
            
            ctx.restore();
        }

        function animate(timestamp) {
            if (!startTime) startTime = timestamp;
            let elapsed = timestamp - startTime;
            
            ctx.clearRect(0, 0, width, height);
            
            // --- TIMELINE LOGIC ---
            
            // 0 - 2000ms : Fast oscillating white wave
            if (elapsed < 2000) {
                params.wavelength = 60;
                params.amplitude = 40;
                params.speed = 0.2;
                params.r = 255; params.g = 255; params.b = 255;
                params.glow = 15;
                params.measureAlpha = 0;
            }
            
            // 2000ms - 4000ms : Zoom in (Macro style)
            else if (elapsed >= 2000 && elapsed < 4000) {
                let t = (elapsed - 2000) / 2000;
                let eased = easeInOutQuad(t);
                
                params.wavelength = 60 + (350 - 60) * eased; // zoom wavelength
                params.amplitude = 40 + (180 - 40) * eased;  // zoom amplitude
                params.speed = 0.2 - (0.18) * eased;         // slow down to lock in
            }
            
            // 4000ms - 5500ms : Measure
            else if (elapsed >= 4000 && elapsed < 5500) {
                let t = (elapsed - 4000) / 1500;
                params.wavelength = 350;
                params.amplitude = 180;
                params.speed = 0.02; // very slow crawl
                params.measureAlpha = Math.min(1, t * 2); // fade in measurement
                
                if (elapsed > 4500) readout.classList.remove('opacity-0', 'translate-y-4');
            }
            
            // 5500ms - 7000ms : Burst into Greenish-Yellow (550nm visible spectrum)
            else if (elapsed >= 5500 && elapsed < 7000) {
                let t = (elapsed - 5500) / 1500;
                let eased = easeOutQuint(t);
                
                // White to Chartreuse / Greenish Yellow (173, 255, 47)
                params.r = 255 - (255 - 173) * eased;
                params.g = 255;
                params.b = 255 - (255 - 47) * eased;
                
                // Dramatic glow burst
                if (t < 0.2) params.glow = 15 + (100 * (t/0.2));
                else params.glow = 115 - (65 * ((t-0.2)/0.8)); // settle at 50
                
                params.lineWidth = 3 + 2 * eased;
            }
            
            // 7000ms+ : Pulse & Show High Frequency
            else if (elapsed >= 7000) {
                params.r = 173; params.g = 255; params.b = 47;
                params.glow = 50 + Math.sin(elapsed * 0.02) * 20; // Rhythmic glow pulse
                
                if (elapsed > 7500) {
                    freqReadout.classList.remove('opacity-0');
                    overlay.classList.add('rhythmic-pulse');
                    
                    // Show high frequency visual contrast
                    let pulseT = Math.min(1, (elapsed - 7500) / 2000);
                    params.pulseIntensity = easeInOutQuad(pulseT);
                }
            }

            // Draw layers
            drawHighFrequencyBackground(params.pulseIntensity, elapsed);
            drawWave();
            drawMeasurement();
            
            // Update wave phase to make it travel
            params.phase += params.speed;
            
            animationFrameId = requestAnimationFrame(animate);
        }

        // Initialization
        function startAnimation() {
            cancelAnimationFrame(animationFrameId);
            startTime = 0;
            
            // Reset UI
            readout.classList.add('opacity-0', 'translate-y-4');
            freqReadout.classList.add('opacity-0');
            overlay.classList.remove('rhythmic-pulse');
            
            // Reset state
            params = {
                phase: 0,
                wavelength: 60,
                amplitude: 40,
                speed: 0.2,
                r: 255, g: 255, b: 255,
                glow: 15,
                lineWidth: 3,
                measureAlpha: 0,
                pulseIntensity: 0
            };
            
            animationFrameId = requestAnimationFrame(animate);
        }

        restartBtn.addEventListener('click', startAnimation);
        
        // Start automatically
        startAnimation();

    </script>
</body>
</html>
